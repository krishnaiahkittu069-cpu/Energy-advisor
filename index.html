<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Energy Advisor ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+Telugu&family=Noto+Sans+Devanagari&family=Noto+Sans+Tamil&family=Noto+Sans+Kannada&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #1a2234;
    --accent: #f59e0b;
    --accent2: #10b981;
    --danger: #ef4444;
    --warn: #f97316;
    --text: #f1f5f9;
    --muted: #64748b;
    --border: #1e293b;
    --glow: 0 0 20px rgba(245,158,11,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── WARNING BANNER ─── */
  #warnBanner {
    display: none;
    background: linear-gradient(90deg, #7c2d12, #dc2626, #7c2d12);
    background-size: 200% 100%;
    animation: bannerPulse 1.2s linear infinite;
    color: #fff;
    text-align: center;
    padding: 10px 16px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #warnBanner.show { display: block; }
  @keyframes bannerPulse {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    box-shadow: var(--glow);
  }
  .logo-text { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .logo-sub { font-size: 0.7rem; color: var(--muted); font-weight: 400; }

  /* ─── LANG SELECTOR ─── */
  .lang-bar {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .lang-btn {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card2);
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn:nth-child(2) { font-family: 'Noto Sans Telugu', sans-serif; }
  .lang-btn:nth-child(3) { font-family: 'Noto Sans Devanagari', sans-serif; }
  .lang-btn:nth-child(4) { font-family: 'Noto Sans Tamil', sans-serif; }
  .lang-btn:nth-child(5) { font-family: 'Noto Sans Kannada', sans-serif; }

  .lang-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ─── STATS BAR ─── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 10px 12px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--card2);
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
    border: 1px solid var(--border);
    position: relative;
  }
  .stat-val {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-val.ok   { color: var(--accent2); }
  .stat-val.warn { color: var(--warn); }
  .stat-val.bad  { color: var(--danger); }
  .stat-lbl {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── ENERGY ACCUMULATOR NOTE ─── */
  .energy-note {
    font-size: 0.6rem;
    color: var(--accent2);
    margin-top: 2px;
  }

  /* ─── EDIT READINGS ─── */
  .edit-bar {
    display: none;
    padding: 10px 12px;
    background: #0f172a;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-wrap: wrap;
  }
  .edit-bar.open { display: flex; }
  .edit-field {
    flex: 1; min-width: 100px;
    background: var(--card);
    border: 1px
