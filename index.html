<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartWatt – IoT Energy Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --bg4: #1e2d42;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(0,212,255,0.2);
    --glow: 0 0 20px rgba(0,212,255,0.15);
    --radius: 12px;
    --radius2: 18px;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

  /* ── Animated BG ── */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── Setup Overlay ── */
  #setup-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(10,14,26,0.97);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .setup-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 40px;
    max-width: 480px; width: 90%;
    box-shadow: 0 0 40px rgba(0,212,255,0.1);
  }
  .setup-logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .setup-logo span { color: var(--accent); }
  .setup-subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  .setup-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .setup-input {
    width: 100%; padding: 12px 14px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: var(--mono); font-size: 13px;
    outline: none; transition: border 0.2s;
  }
  .setup-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  .setup-btn {
    width: 100%; margin-top: 16px; padding: 14px; background: var(--accent);
    color: #0a0e1a; font-family: var(--font); font-size: 15px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .setup-btn:hover { opacity: 0.9; }
  .setup-btn:active { transform: scale(0.98); }
  .setup-note { font-size: 12px; color: var(--text3); margin-top: 12px; text-align: center; line-height: 1.5; }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 64px 1fr; min-height: 100vh; }
  .topbar {
    grid-column: 1/-1;
    background: rgba(17,24,39,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; position: sticky; top: 0; z-index: 50;
  }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .conn-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    background: var(--bg3); border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; }
  .conn-badge.connected { border-color: rgba(16,185,129,0.4); color: var(--accent3); }
  .conn-badge.connected .conn-dot { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); animation: pulse 2s infinite; }
  .conn-badge.disconnected { border-color: rgba(239,68,68,0.4); color: var(--danger); }
  .conn-badge.disconnected .conn-dot { background: var(--danger); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .lang-select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font); font-size: 13px; padding: 6px 10px; border-radius: 8px; cursor: pointer; outline: none;
  }
  .lang-select:focus { border-color: var(--accent); }
  .reset-key-btn {
    padding: 6px 12px; background: transparent; border: 1px solid var(--border);
    color: var(--text2); font-family: var(--font); font-size: 12px;
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
  }
  .reset-key-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bg2); border-right: 1px solid var(--border);
    padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
  }
  .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; padding: 0 4px; margin-bottom: 4px; }

  /* Metric Cards */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; position: relative; overflow: hidden;
    transition: border-color 0.3s;
  }
  .metric-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--mc-color, var(--accent)); opacity: 0.7;
  }
  .metric-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .metric-val { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); }
  .metric-val span { font-size: 11px; color: var(--text3); margin-left: 2px; }
  .metric-trend { font-size: 10px; margin-top: 2px; }
  .metric-trend.up { color: var(--danger); }
  .metric-trend.down { color: var(--accent3); }
  .metric-wide { grid-column: 1/-1; }

  /* Bill card */
  .bill-card {
    background: linear-gradient(135deg, var(--bg3) 0%, rgba(124,58,237,0.1) 100%);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: var(--radius); padding: 14px;
  }
  .bill-amount { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--text); }
  .bill-amount .currency { font-size: 16px; color: var(--text2); margin-right: 2px; }
  .bill-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .bill-bar { height: 4px; background: var(--bg4); border-radius: 2px; margin: 10px 0; overflow: hidden; }
  .bill-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 1s; }
  .pay-btn {
    width: 100%; padding: 10px; background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.5);
    color: #c4b5fd; font-family: var(--font); font-size: 13px; font-weight: 500;
    border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .pay-btn:hover { background: rgba(124,58,237,0.35); }

  /* Chart mini */
  .chart-wrap { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .chart-container { position: relative; height: 100px; }

  /* Quick insights */
  .insight-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px; background: var(--bg3); border-radius: 8px;
    border: 1px solid var(--border); font-size: 12px; color: var(--text2);
  }
  .insight-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* ── Main ── */
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .main-header {
    padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between;
  }
  .main-title { font-size: 16px; font-weight: 600; }
  .main-title span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .realtime-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--accent); font-weight: 500;
    background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.15);
    padding: 4px 10px; border-radius: 20px;
  }

  /* ── Chat ── */
  .chat-area {
    flex: 1; display: flex; flex-direction: column;
    padding: 16px 24px; gap: 12px; overflow: hidden;
  }
  .messages {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    padding-right: 4px; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;
  }
  .msg.ai .msg-avatar { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); font-size: 12px; }
  .msg.user .msg-avatar { background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4); color: #c4b5fd; }
  .msg-bubble {
    max-width: 72%; padding: 12px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.6;
  }
  .msg.ai .msg-bubble { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }
  .msg.user .msg-bubble { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: var(--text); }
  .msg-time { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .msg.user .msg-time { text-align: right; }
  .typing-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.6; animation: blink 1.2s infinite; margin: 0 1px; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

  /* TTS controls on message */
  .msg-tts { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; gap: 6px; align-items: center; }
  .tts-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: color 0.2s; }
  .tts-btn:hover { color: var(--accent); }

  /* Input */
  .chat-input-wrap {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px;
    display: flex; align-items: flex-end; gap: 8px;
    transition: border-color 0.2s;
  }
