<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Ollama Voice Assistant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: none;
      padding: 15px;
      font-size: 16px;
      resize: none;
      outline: none;
    }

    .controls {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    button, select {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
    }

    button {
      background: #3b82f6;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
    }

    .response {
      margin-top: 20px;
      background: #334155;
      padding: 15px;
      border-radius: 12px;
      min-height: 120px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Offline Ollama Voice Assistant</h1>

  <textarea id="prompt" placeholder="Type or speak something..."></textarea>

  <div class="controls">
    <button onclick="startListening()">🎤 Mic</button>
    <button onclick="sendPrompt()">🚀 Ask Ollama</button>
    <button onclick="speakResponse()">🔊 Speak</button>

    <select id="languageSelect">
      <option value="en-US">English</option>
      <option value="hi-IN">Hindi</option>
      <option value="te-IN">Telugu</option>
      <option value="ta-IN">Tamil</option>
      <option value="fr-FR">French</option>
    </select>
  </div>

  <div class="response" id="responseBox">
    Response will appear here...
  </div>
</div>

<script>
  const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.continuous = false;
  recognition.interimResults = false;

  function startListening() {
